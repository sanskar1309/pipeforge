<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Preconnect to backend -->
    <link rel="preconnect" href="https://pipeforge-siva.onrender.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary meta -->
    <title>Pipeforge — Visual Pipeline Builder</title>
    <meta name="description" content="Drag-and-drop pipeline builder with real-time DAG validation and LLM integration. Build, connect, and validate AI workflows visually." />
    <meta name="theme-color" content="#071126" />
    <meta name="author" content="Pipeforge" />
    <meta name="keywords" content="pipeline builder, DAG, visual editor, LLM, AI workflow, ReactFlow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pipeforge-beta.vercel.app/" />
    <meta property="og:title" content="Pipeforge — Visual Pipeline Builder" />
    <meta property="og:description" content="Drag-and-drop pipeline builder with real-time DAG validation and LLM integration. Build, connect, and validate AI workflows visually." />
    <meta property="og:site_name" content="Pipeforge" />
    <meta property="og:image" content="https://pipeforge-beta.vercel.app/pipeforge.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Pipeforge — Visual DAG pipeline builder with LLM integration" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pipeforge — Visual Pipeline Builder" />
    <meta name="twitter:description" content="Drag-and-drop pipeline builder with real-time DAG validation and LLM integration." />
    <meta name="twitter:image" content="https://pipeforge-beta.vercel.app/pipeforge.png" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <style>
        #splash {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background: #07091a;
          gap: 16px;
        }
        #splash-title {
          font-family: system-ui, sans-serif;
          font-size: 24px;
          font-weight: 700;
          color: #fff;
          letter-spacing: -0.5px;
        }
        #splash-sub {
          font-family: system-ui, sans-serif;
          font-size: 13px;
          color: #475569;
        }
        #splash-bar {
          width: 160px;
          height: 3px;
          background: #1e2040;
          border-radius: 99px;
          overflow: hidden;
        }
        #splash-fill {
          height: 100%;
          width: 40%;
          background: linear-gradient(90deg, #6366f1, #a855f7);
          border-radius: 99px;
          animation: slide 1.2s ease-in-out infinite;
        }
        @keyframes slide {
          0%   { transform: translateX(-100%); }
          100% { transform: translateX(400%); }
        }
      </style>
      <div id="splash">
        <div id="splash-title">Pipeforge</div>
        <div id="splash-bar"><div id="splash-fill"></div></div>
        <div id="splash-sub">Loading pipeline editor…</div>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#071126"/>

  <!-- Node: left -->
  <rect x="4" y="24" width="16" height="16" rx="4" fill="#1f6feb"/>
  <!-- Node: center-top -->
  <rect x="24" y="8" width="16" height="16" rx="4" fill="#1f6feb"/>
  <!-- Node: center-bottom -->
  <rect x="24" y="40" width="16" height="16" rx="4" fill="#1f6feb"/>
  <!-- Node: right -->
  <rect x="44" y="24" width="16" height="16" rx="4" fill="#4ade80"/>

  <!-- Edge: left → center-top -->
  <line x1="20" y1="29" x2="24" y2="19" stroke="#9fb3d0" stroke-width="2" stroke-linecap="round"/>
  <!-- Edge: left → center-bottom -->
  <line x1="20" y1="35" x2="24" y2="45" stroke="#9fb3d0" stroke-width="2" stroke-linecap="round"/>
  <!-- Edge: center-top → right -->
  <line x1="40" y1="19" x2="44" y2="29" stroke="#9fb3d0" stroke-width="2" stroke-linecap="round"/>
  <!-- Edge: center-bottom → right -->
  <line x1="40" y1="45" x2="44" y2="35" stroke="#9fb3d0" stroke-width="2" stroke-linecap="round"/>
</svg>
